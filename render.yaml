services:
  # ──────────────────────────────────────────────────
  # 1. Node.js Backend
  # ──────────────────────────────────────────────────
  - type: web
    name: partimepal-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node app.js
    plan: free
    envVars:
      - key: MONGODBURL
        sync: false
      - key: ML_SERVICE_URL
        value: https://partimepal-ml.onrender.com
      - key: FRONTEND_URL
        value: https://partimepal-frontend.onrender.com
      - key: NODE_ENV
        value: production

  # ──────────────────────────────────────────────────
  # 2. Python FastAPI ML Service
  # ──────────────────────────────────────────────────
  - type: web
    name: partimepal-ml
    runtime: python
    rootDir: ML
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false

  # ──────────────────────────────────────────────────
  # 3. React Frontend (Static Site)
  # ──────────────────────────────────────────────────
  - type: web
    name: partimepal-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://partimepal-backend.onrender.com
